<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <title>Cadastro de Usuários</title>
</head>

<body>

    <header>
        <h1>Cadastro de Usuários</h1>
    </header>

    <main>

        <h3 class="title">Realize o preenchimento dos campos e aperte o botão "Cadastrar".</h3>

        <div class="box">
            <div class="top-actions">
                <p class="status-text"></p>
                <button type="button" class="logout-btn">Logout</button>
            </div>

            <form id="register-form">
                <input type="text" class="complete_name" name="complete_name" placeholder="Nome">
                <input type="text" class="email" name="email" placeholder="E-mail">
                <input type="text" class="username" name="username" placeholder="Nome de usuário">
                <input type="password" class="pass" name="pass" placeholder="Senha">
                <input type="text" class="tel" name="tel" placeholder="Telefone">

                <button type="submit" class="register-btn">Cadastrar</button>
            </form>

            <p class="helper-link">
                Já tem login? <a href="login.html">Ir para login</a>
            </p>
        </div>

    </main>

    <footer>
        <h2>
            <a href="https://github.com/nicollaswendel" target="_blank">&copy; Nícollas Wendel</a>
        </h2>
    </footer>

</body>
</html>
