<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/login.js" defer></script>
    <title>Login</title>
</head>

<body>

    <header>
        <h1>Login de Usuário</h1>
    </header>

    <main>

        <h3 class="title">Informe suas credenciais para acessar o sistema.</h3>

        <div class="box">
            <form id="login-form">
                <input type="text" class="email" name="email" placeholder="E-mail">
                <input type="password" class="pass" name="pass" placeholder="Senha">

                <button type="submit">Entrar</button>
            </form>

            <p class="helper-link">
                Não tem conta? <a href="index.html">Ir para cadastro</a>
            </p>
        </div>

    </main>

    <footer>
        <h2>
            <a href="https://github.com/nicollaswendel" target="_blank">&copy; Nícollas Wendel</a>
        </h2>
    </footer>

</body>
</html>
